<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#070b17">
  <title>Avito — презентация кейса</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="presentation" class="presentation" aria-label="Презентация" aria-live="polite">
    <div id="background" class="background" aria-hidden="true"></div>
    <div id="slides" class="slides"></div>
    <div class="vignette" aria-hidden="true"></div>

    <div id="loading" class="loading" role="status">
      <span class="spinner" aria-hidden="true"></span>
      <span id="loadingText">Загрузка слайдов…</span>
    </div>

    <section id="startScreen" class="start-screen">
      <div class="start-card">
        <p class="eyebrow">AVITO CASE</p>
        <h1>Презентация проекта</h1>
        <p id="preloadStatus">Подготавливаем материалы…</p>
        <button id="startButton" class="start-button" type="button" disabled>
          Начать презентацию
        </button>
      </div>
    </section>

    <div id="errorNotice" class="error-notice" role="alert" hidden></div>

    <div id="controls" class="controls" aria-label="Управление презентацией">
      <div class="control-group">
        <div id="counter" class="counter" aria-label="Номер текущего слайда">1 / 12</div>
        <button id="previousButton" class="icon-button" type="button" aria-label="Предыдущий слайд" title="Предыдущий слайд (←)">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M19 12H5M11 18l-6-6 6-6"/>
          </svg>
        </button>
        <button id="playButton" class="icon-button" type="button" aria-label="Пауза" title="Пауза / продолжить">
          <span id="playIcon" class="play-icon is-pause" aria-hidden="true">
            <svg class="button-icon icon-pause" viewBox="0 0 24 24" focusable="false">
              <path class="filled" d="M7 5.5A1.5 1.5 0 0 1 8.5 4h1A1.5 1.5 0 0 1 11 5.5v13A1.5 1.5 0 0 1 9.5 20h-1A1.5 1.5 0 0 1 7 18.5v-13Zm6 0A1.5 1.5 0 0 1 14.5 4h1A1.5 1.5 0 0 1 17 5.5v13a1.5 1.5 0 0 1-1.5 1.5h-1a1.5 1.5 0 0 1-1.5-1.5v-13Z"/>
            </svg>
            <svg class="button-icon icon-play" viewBox="0 0 24 24" focusable="false">
              <path class="filled" d="M7.2 5.3a1.5 1.5 0 0 1 2.25-1.29l10.1 6.7a1.55 1.55 0 0 1 0 2.58l-10.1 6.7A1.5 1.5 0 0 1 7.2 18.7V5.3Z"/>
            </svg>
          </span>
        </button>
        <button id="nextButton" class="icon-button" type="button" aria-label="Следующий слайд" title="Следующий слайд (→)">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
        </button>
        <button id="fullscreenButton" class="icon-button fullscreen-button" type="button" aria-label="Полноэкранный режим" title="Полноэкранный режим">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M8 4H4v4M16 4h4v4M20 16v4h-4M8 20H4v-4"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="progress-track" aria-hidden="true">
      <div id="progressBar" class="progress-bar"></div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
